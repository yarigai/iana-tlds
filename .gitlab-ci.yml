image: node:20-slim

stages:
  - build
  - publish

variables:
  PNPM_VERSION: "10.33.0"

before_script:
  - corepack enable
  - corepack prepare pnpm@${PNPM_VERSION} --activate

# ─── Build & Test ─────────────────────────────────────────────────────────────
#
# Runs on every push to the default branch and on scheduled pipelines.
# Fetches the current IANA TLD list, builds the package, and runs tests.
# Coverage percentage is extracted for the GitLab coverage badge.

build_and_test:
  stage: build
  script:
    - pnpm install --frozen-lockfile
    - node scripts/update-tlds.mjs
    - pnpm run build
    - pnpm test:coverage
  coverage: '/All files\s*\|\s*([\d.]+)/'
  artifacts:
    paths:
      - dist/
      - src/data/tlds.ts
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ─── Publish ──────────────────────────────────────────────────────────────────
#
# Scheduled runs: publishes automatically only when IANA data has changed.
#   Requires CI/CD variables: NPM_TOKEN, GITLAB_TOKEN (project access token
#   with write_repository scope, needed to commit the updated tlds.ts back).
#
# Manual trigger on the default branch: always builds and publishes.

publish_package:
  stage: publish
  dependencies:
    - build_and_test
  script:
    # Scheduled sync: only publish if IANA data changed, then bump version
    - |
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then
        if git diff --quiet src/data/tlds.ts; then
          echo "TLD list unchanged — skipping publish."
          exit 0
        fi
        echo "TLD list updated — proceeding with publish."
        pnpm version patch --no-git-tag-version
      fi

    - NEW_VERSION=$(node -p "require('./package.json').version")
    - echo "Publishing v${NEW_VERSION}"

    # Publish to npm
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - pnpm publish --access public --no-git-checks

    # Commit updated files and push back to the repo (scheduled syncs only)
    - |
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then
        git config user.email "ci-bot@yarigai.mx"
        git config user.name "Yarigai CI Bot"
        git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
        git add src/data/tlds.ts package.json
        git commit -m "chore(sync): update IANA TLD list → v${NEW_VERSION} [skip ci]"
        git tag "v${NEW_VERSION}"
        git push origin HEAD:${CI_DEFAULT_BRANCH}
        git push origin "v${NEW_VERSION}"
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
